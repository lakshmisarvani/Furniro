<section class="relative h-56 overflow-hidden">
  <img src="assets/images/heropage.png" alt="Shop Banner" class="w-full h-full object-cover" />
  <div class="absolute inset-0 bg-white bg-opacity-60 flex flex-col items-center justify-center">
    <div class="flex items-center gap-2 mb-2">
      <img src="assets/images/logo.png" alt="Furniro" class="h-8 w-auto" />
    </div>
    <h1 class="text-4xl font-semibold text-text-dark">Shop</h1>
    <div class="mt-3">
      <app-breadcrumb [items]="breadcrumbs" />
    </div>
  </div>
</section>

<!-- Filter / Sort bar -->
<div class="bg-bg-light py-5 border-b border-border-light">
  <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row md:items-center justify-between gap-4">

    <!-- Left: view toggles + showing text -->
    <div class="flex items-center gap-5">
      <button class="flex items-center gap-2 text-text-dark hover:text-primary transition-colors duration-200">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/>
        </svg>
        <span class="font-semibold text-base">Filter</span>
      </button>

      <div class="w-px h-8 bg-border-light"></div>

      <!-- Grid 4 / Grid 3 toggle -->
      <div class="flex items-center gap-3">
        <button
          data-testid="grid4-btn"
          (click)="viewMode = 'grid4'"
          [ngClass]="viewMode === 'grid4' ? 'text-primary' : 'text-text-gray hover:text-primary'"
          class="transition-colors duration-200" title="4-column grid">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
          </svg>
        </button>
        <button
          data-testid="grid3-btn"
          (click)="viewMode = 'grid3'"
          [ngClass]="viewMode === 'grid3' ? 'text-primary' : 'text-text-gray hover:text-primary'"
          class="transition-colors duration-200" title="3-column grid">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
          </svg>
        </button>
      </div>

      <div class="w-px h-8 bg-border-light"></div>
      <p data-testid="showing-text" class="text-text-gray text-sm">{{ showingText }}</p>
    </div>

    <!-- Right: Show count + Sort -->
    <div class="flex items-center gap-6">

      <!-- Show count -->
      <div class="flex items-center gap-3">
        <label class="text-text-dark font-medium">Show</label>
        <select
          data-testid="show-select"
          [value]="showCount"
          (change)="onShowCountChange($any($event.target).value)"
          class="bg-white border border-border-light text-text-dark text-sm px-3 py-2 outline-none cursor-pointer hover:border-primary transition-colors duration-200 rounded-sm">
          <option value="8">8</option>
          <option value="16">16</option>
          <option value="32">32</option>
        </select>
      </div>

      <!-- Sort -->
      <div class="flex items-center gap-3">
        <label class="text-text-dark font-medium">Sort by</label>
        <select
          data-testid="sort-select"
          [value]="sortBy"
          (change)="sortBy = $any($event.target).value; onSortChange()"
          class="bg-white border border-border-light text-text-dark text-sm px-3 py-2 outline-none cursor-pointer hover:border-primary transition-colors duration-200 rounded-sm">
          <option value="default">Default</option>
          <option value="name">Name</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Product grid -->
<section class="py-14 bg-white">
  <div class="max-w-7xl mx-auto px-6">

    <!-- Empty state -->
    @if (displayedProducts.length === 0) {
      <div data-testid="empty-state" class="text-center py-24">
        <p class="text-text-gray text-lg">No products found.</p>
      </div>
    }

    <!-- Grid -->
    <div
      data-testid="product-grid"
      [ngClass]="viewMode === 'grid4'
        ? 'grid grid-cols-2 md:grid-cols-4 gap-6'
        : 'grid grid-cols-2 md:grid-cols-3 gap-8'">
      @for (product of displayedProducts; track $index) {
        <app-product-card [product]="product" />
      }
    </div>

    <!-- Pagination -->
    @if (totalPages > 1) {
      <div data-testid="pagination" class="flex justify-center items-center gap-3 mt-14">

        <!-- Prev -->
        <button
          data-testid="prev-btn"
          (click)="setPage(currentPage - 1)"
          [disabled]="currentPage === 1"
          class="px-6 py-3 bg-bg-light text-text-dark text-sm font-medium rounded-sm
                 hover:bg-primary hover:text-white transition-all duration-200
                 disabled:opacity-40 disabled:cursor-not-allowed">
          Prev
        </button>

        <!-- Page numbers -->
        @for (page of pageNumbers; track page) {
          <button
            data-testid="page-btn"
            (click)="setPage(page)"
            class="w-12 h-12 text-sm font-semibold rounded-sm transition-all duration-200"
            [ngClass]="currentPage === page
              ? 'bg-primary text-white shadow-md'
              : 'bg-bg-light text-text-dark hover:bg-primary hover:text-white'">
            {{ page }}
          </button>
        }

        <!-- Next -->
        <button
          data-testid="next-btn"
          (click)="setPage(currentPage + 1)"
          [disabled]="currentPage === totalPages"
          class="px-6 py-3 bg-bg-light text-text-dark text-sm font-medium rounded-sm
                 hover:bg-primary hover:text-white transition-all duration-200
                 disabled:opacity-40 disabled:cursor-not-allowed">
          Next
        </button>
      </div>
    }

  </div>
</section>

<app-service-features />
