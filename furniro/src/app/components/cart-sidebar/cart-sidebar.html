@if (isOpen) {
  <div class="fixed inset-0 z-40" (click)="close()"></div>
}
<div class="fixed top-[72px] right-0 w-[380px] max-h-[calc(100vh-80px)] bg-white z-50 shadow-2xl flex flex-col transition-transform duration-300 ease-in-out"
  [ngClass]="isOpen ? 'translate-x-0' : 'translate-x-full'">
  <div class="flex items-center justify-between px-8 pt-8 pb-6 border-b border-border-light flex-shrink-0">
    <h2 class="text-2xl font-semibold text-text-dark">Shopping Cart</h2>
    <button (click)="close()"
      class="w-8 h-8 rounded-full border border-text-gray flex items-center justify-center hover:border-primary hover:text-primary transition-colors duration-200 text-text-gray">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto px-8 py-6 space-y-6">
    @if (items.length === 0) {
      <div class="flex flex-col items-center justify-center h-40 text-text-gray">
        <svg class="w-12 h-12 mb-3 text-border-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        <p class="text-sm">Your cart is empty</p>
      </div>
    }

    @for (item of items; track item.product.id) {
      <div class="flex items-center gap-4 group">
        <button (click)="navigate('/shop/' + item.product.id)"
          class="w-24 h-24 bg-bg-cream rounded-sm overflow-hidden flex-shrink-0 hover:opacity-90 transition-opacity duration-200">
          <img [src]="item.product.image" [alt]="item.product.name" class="w-full h-full object-cover" />
        </button>

        <div class="flex-1 min-w-0">
          <button (click)="navigate('/shop/' + item.product.id)"
            class="text-text-dark font-semibold text-sm leading-snug hover:text-primary transition-colors duration-200 text-left">
            {{ item.product.name }}
          </button>
          <p class="text-text-gray text-xs mt-1">
            {{ item.quantity }} x
            <span class="text-primary font-medium">{{ fmt(item.product.price) }}</span>
          </p>
        </div>

        <button (click)="remove(item.product.id)"
          class="w-6 h-6 rounded-full border border-text-gray flex items-center justify-center flex-shrink-0 hover:border-badge-sale hover:text-badge-sale transition-colors duration-200 text-text-gray opacity-0 group-hover:opacity-100">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    }
  </div>
  @if (items.length > 0) {
    <div class="px-8 py-6 border-t border-border-light flex-shrink-0">
      <div class="flex items-center justify-between mb-6">
        <span class="text-text-dark font-medium">Subtotal</span>
        <span class="text-primary font-semibold text-lg">{{ fmt(subtotal) }}</span>
      </div>

      <div class="flex gap-3">
        <button (click)="navigate('/cart')"
          class="flex-1 border border-text-dark text-text-dark text-xs font-medium py-2.5 rounded-full hover:bg-text-dark hover:text-white transition-all duration-200">
          Cart
        </button>
        <button (click)="navigate('/checkout')"
          class="flex-1 border border-text-dark text-text-dark text-xs font-medium py-2.5 rounded-full hover:bg-text-dark hover:text-white transition-all duration-200">
          Checkout
        </button>
        <button (click)="navigate('/compare')"
          class="flex-1 border border-text-dark text-text-dark text-xs font-medium py-2.5 rounded-full hover:bg-text-dark hover:text-white transition-all duration-200">
          Comparison
        </button>
      </div>
    </div>
  }
</div>
